<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Muster — HR Policy Assistant</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 52 38'%3E%3Ccircle cx='14' cy='22' r='10' fill='%23485BC8'/%3E%3Ccircle cx='26' cy='16' r='13' fill='%23485BC8'/%3E%3Ccircle cx='38' cy='22' r='10' fill='%23485BC8'/%3E%3Crect x='4' y='22' width='44' height='14' rx='2' fill='%23485BC8'/%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;border:0}
    html{font-size:15px;line-height:1.55;-webkit-font-smoothing:antialiased}
    body{font-family:'Plus Jakarta Sans',system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif}
    a{color:inherit;text-decoration:none}

    :root{
      --primary:rgb(72,91,200);--primary-dark:rgb(61,71,137);--primary-deep:rgb(40,50,110);
      --accent:#f3a10b;--accent-dark:#d97706;
      --primary-light:rgb(193,216,245);--primary-mid:rgb(141,167,195);--primary-xlight:rgb(235,242,251);
      --bg:#fff;--bg-soft:rgb(235,242,251);--bg-muted:#f0f1f2;--bg-sunken:#e1e2e3;
      --border:#e1e2e3;--border-strong:#cbcecf;
      --fg:rgb(35,35,41);--fg-muted:#485a6c;--fg-subtle:#abb8c3;
      --red:#e86464;--red-bg:#ffe6e6;--red-text:#640000;
      --shadow-sm:0 1px 3px rgba(35,35,41,.08),0 1px 2px rgba(35,35,41,.05);
      --shadow-md:0 4px 12px rgba(35,35,41,.10),0 1px 3px rgba(35,35,41,.06);
      --shadow-lg:0 12px 32px rgba(35,35,41,.12),0 2px 8px rgba(35,35,41,.06);
      --r:10px;--sidebar-w:220px;
    }

    body{display:flex;height:100vh;overflow:hidden;background:var(--bg-soft);color:var(--fg)}

    /* ── Hamburger (mobile only) ── */
    .hamburger{display:none;align-items:center;justify-content:center;width:36px;height:36px;border-radius:8px;background:none;cursor:pointer;color:var(--fg);flex-shrink:0}
    .hamburger:hover{background:var(--bg-muted)}
    .sidebar-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:149}
    .sidebar-backdrop.open{display:block}

    /* ── Sidebar ── */
    .sidebar{width:var(--sidebar-w);flex-shrink:0;height:100vh;overflow-y:auto;background:var(--bg);border-right:1px solid var(--border);display:flex;flex-direction:column}
    .sidebar-logo{height:56px;display:flex;align-items:center;gap:9px;padding:0 20px;border-bottom:1px solid var(--border);flex-shrink:0}
    .logo-icon{flex-shrink:0}
    .logo-name{font-size:15px;font-weight:600;color:var(--fg)}

    .nav{padding:12px 10px;flex:1}
    .nav-section{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--fg-subtle);padding:0 8px;margin:18px 0 5px}
    .nav-section:first-child{margin-top:0}
    .nav-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:8px;color:var(--fg-muted);font-size:13.5px;font-weight:500;cursor:pointer;transition:background .15s,color .15s;margin-bottom:2px;border:none;background:none;width:100%;text-align:left}
    .nav-item:hover{background:var(--bg-muted);color:var(--fg)}
    .nav-item.active{background:var(--primary);color:#fff}
    .nav-item .icon{width:16px;height:16px;flex-shrink:0;opacity:.75}
    .nav-item.active .icon{opacity:1}
    .nav-badge{margin-left:auto;background:var(--red);color:#fff;font-size:10px;font-weight:700;padding:1px 6px;border-radius:20px;min-width:18px;text-align:center}

    .sidebar-footer{padding:14px 20px;border-top:1px solid var(--border);flex-shrink:0;display:flex;flex-direction:column;gap:10px}
    .sidebar-link{font-size:12px;color:var(--fg-subtle);display:flex;align-items:center;gap:6px;background:none;cursor:pointer;text-align:left}
    .sidebar-link:hover{color:var(--fg-muted)}

    /* ── Main ── */
    .main{flex:1;display:flex;flex-direction:column;overflow:hidden}
    .topbar{background:var(--bg);border-bottom:1px solid var(--border);height:56px;padding:0 24px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:12px}
    .topbar-left{display:flex;flex-direction:column;min-width:0}
    .topbar-section{font-size:10.5px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--primary)}
    .topbar-title{font-size:15px;font-weight:600;color:var(--fg)}
    .topbar-actions{display:flex;gap:8px;align-items:center;flex-shrink:0}
    .content{flex:1;overflow-y:auto;padding:24px}

    /* ── Buttons ── */
    .btn{display:inline-flex;align-items:center;gap:6px;height:36px;padding-inline:16px;border-radius:8px;font-size:13.5px;font-weight:500;cursor:pointer;border:none;transition:background .15s,color .15s;white-space:nowrap}
    .btn:disabled{opacity:.5;cursor:not-allowed}
    .btn-primary{background:var(--primary);color:#fff}
    .btn-primary:hover:not(:disabled){background:var(--primary-dark)}
    .btn-accent{background:var(--accent);color:#fff}
    .btn-accent:hover:not(:disabled){background:var(--accent-dark)}
    .btn-secondary{background:transparent;color:var(--fg-muted);border:1px solid var(--border)}
    .btn-secondary:hover:not(:disabled){background:var(--bg-muted);color:var(--fg)}
    .btn-danger{background:var(--red-bg);color:var(--red-text)}
    .btn-danger:hover:not(:disabled){background:#fecaca}
    .btn-ghost-primary{background:var(--primary-xlight);color:var(--primary-deep);border:1px solid var(--primary-mid)}
    .btn-ghost-primary:hover:not(:disabled){background:var(--primary-light)}
    .btn-sm{height:28px;padding-inline:10px;font-size:12px}
    .btn-lg{height:44px;padding-inline:22px;font-size:14px;font-weight:600}

    /* ── Cards ── */
    .card{background:var(--bg);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--shadow-sm)}
    .card-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:12px}
    .card-title{font-size:14px;font-weight:600;color:var(--fg)}
    .card-body{padding:20px}

    /* ── Step cards (onboarding) ── */
    .steps-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:24px}
    .step-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:22px;box-shadow:var(--shadow-sm);display:flex;flex-direction:column;gap:14px}
    .step-card.step-done{border-color:var(--primary-mid);background:var(--primary-xlight)}
    .step-num-badge{width:32px;height:32px;border-radius:999px;background:var(--primary-xlight);border:2px solid var(--primary-mid);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--primary-deep);flex-shrink:0}
    .step-card.step-done .step-num-badge{background:var(--primary);border-color:var(--primary-dark);color:#fff}
    .step-title{font-size:14px;font-weight:600;color:var(--fg)}
    .step-desc{font-size:13px;color:var(--fg-muted);line-height:1.55}
    .step-action{margin-top:auto}

    /* ── Stat cards ── */
    .stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
    .stat-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:18px;box-shadow:var(--shadow-sm)}
    .stat-icon{width:34px;height:34px;border-radius:8px;background:var(--primary-xlight);display:flex;align-items:center;justify-content:center;margin-bottom:10px}
    .stat-icon svg{width:17px;height:17px;color:var(--primary)}
    .stat-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--fg-subtle);margin-bottom:5px}
    .stat-value{font-size:26px;font-weight:700;color:var(--fg);line-height:1}
    .stat-sub{font-size:12px;color:var(--fg-subtle);margin-top:4px}

    /* ── Chips ── */
    .chip{display:inline-flex;align-items:center;gap:4px;height:22px;padding:0 8px;border-radius:999px;font-size:11.5px;font-weight:500;border:1px solid transparent}
    .chip-green{background:var(--primary-light);color:var(--primary-deep);border-color:var(--primary-mid)}
    .chip-gray{background:var(--bg-muted);color:var(--fg-muted);border-color:var(--border-strong)}
    .chip-amber{background:#fef3c7;color:#92400e;border-color:#fde68a}
    .chip-blue{background:#dbeafe;color:#1d4ed8;border-color:#93c5fd}
    .chip-red{background:var(--red-bg);color:var(--red-text);border-color:#fca5a5}

    /* ── Tables ── */
    .table-wrap{overflow-x:auto}
    table{width:100%;border-collapse:collapse;font-size:13.5px}
    th{text-align:left;padding:10px 14px;font-size:10.5px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--fg-subtle);border-bottom:1px solid var(--border);background:var(--bg-soft)}
    td{padding:12px 14px;border-bottom:1px solid var(--bg-muted);vertical-align:top;color:var(--fg-muted)}
    td:first-child{color:var(--fg)}
    tr:last-child td{border-bottom:none}
    tr:hover td{background:var(--bg-soft);cursor:pointer}

    /* ── Forms ── */
    .form-group{margin-bottom:16px}
    label{display:block;font-size:13px;font-weight:500;margin-bottom:6px;color:var(--fg)}
    input[type=text],input[type=number],select,textarea{width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:8px;font-size:13.5px;font-family:inherit;background:var(--bg);color:var(--fg);outline:none;transition:border-color .15s}
    input:focus,select:focus,textarea:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(72,91,200,.1)}
    textarea{resize:vertical;min-height:100px}

    /* ── Toggle ── */
    .toggle-wrap{display:flex;align-items:center;gap:12px}
    .toggle{position:relative;width:44px;height:24px}
    .toggle input{opacity:0;width:0;height:0}
    .toggle-slider{position:absolute;inset:0;background:var(--border-strong);border-radius:24px;cursor:pointer;transition:background .2s}
    .toggle-slider::before{content:'';position:absolute;width:18px;height:18px;left:3px;top:3px;background:white;border-radius:50%;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
    .toggle input:checked + .toggle-slider{background:var(--primary)}
    .toggle input:checked + .toggle-slider::before{transform:translateX(20px)}

    /* ── Upload area ── */
    .upload-zone{border:2px dashed var(--border-strong);border-radius:14px;padding:48px 24px;text-align:center;cursor:pointer;transition:border-color .2s,background .2s;background:var(--bg)}
    .upload-zone:hover,.upload-zone.drag-over{border-color:var(--primary);background:var(--primary-xlight)}
    .upload-zone-icon{font-size:36px;margin-bottom:12px}
    .upload-zone-title{font-size:15px;font-weight:600;color:var(--fg);margin-bottom:6px}
    .upload-zone-sub{font-size:13px;color:var(--fg-muted)}

    /* ── Banner ── */
    .banner{border-radius:var(--r);padding:18px 20px;display:flex;align-items:center;gap:14px;margin-bottom:20px}
    .banner-primary{background:var(--primary-xlight);border:1px solid var(--primary-mid)}
    .banner-amber{background:#fef3c7;border:1px solid #fde68a}
    .banner-icon{font-size:20px;flex-shrink:0}
    .banner-title{font-size:13.5px;font-weight:600;color:var(--fg)}
    .banner-body{font-size:13px;color:var(--fg-muted);margin-top:2px;line-height:1.5}
    .banner-dismiss{background:none;cursor:pointer;color:var(--fg-subtle);font-size:18px;line-height:1;padding:2px 6px;border-radius:4px;flex-shrink:0;align-self:flex-start;margin-top:-2px}
    .banner-dismiss:hover{color:var(--fg);background:rgba(0,0,0,.06)}

    /* ── Skeleton ── */
    .skeleton{background:linear-gradient(90deg,var(--bg-muted) 25%,var(--bg-sunken) 50%,var(--bg-muted) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:6px}
    @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

    /* ── Status items ── */
    .status-item{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}
    .status-item:last-child{border-bottom:none}
    .status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
    .dot-green{background:#22c55e}
    .dot-amber{background:#f59e0b}
    .dot-gray{background:var(--fg-subtle)}
    .status-label{display:flex;align-items:center;gap:8px;font-size:13.5px;color:var(--fg)}
    .status-value{font-size:12.5px;color:var(--fg-subtle)}

    /* ── Toast progress ── */
    .toast-progress{height:3px;background:rgba(255,255,255,.25);border-radius:2px;margin-top:8px;overflow:hidden}
    .toast-progress-fill{height:100%;background:#fff;border-radius:2px;transition:width .2s ease;width:0%}

    /* ── Chat suggestions ── */
    .chat-suggestions{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
    .suggestion-chip{background:var(--primary-xlight);color:var(--primary-deep);border:1px solid var(--primary-mid);border-radius:20px;padding:6px 14px;font-size:12.5px;font-weight:500;cursor:pointer;transition:background .15s}
    .suggestion-chip:hover{background:var(--primary-light)}

    /* ── Modal ── */
    .overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:100;display:none;align-items:center;justify-content:center}
    .overlay.open{display:flex}
    .modal{background:var(--bg);border-radius:14px;width:560px;max-width:95vw;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-lg);border:1px solid var(--border)}
    .modal-header{padding:20px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
    .modal-title{font-size:15px;font-weight:600;color:var(--fg)}
    .modal-close{background:none;font-size:20px;cursor:pointer;color:var(--fg-subtle);line-height:1}
    .modal-close:hover{color:var(--fg)}
    .modal-body{padding:22px}
    .modal-footer{padding:14px 22px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px}

    /* ── Toast ── */
    .toast-wrap{position:fixed;bottom:24px;right:24px;z-index:200;display:flex;flex-direction:column;gap:8px}
    .toast{background:var(--fg);color:#fff;padding:12px 18px;border-radius:10px;font-size:13.5px;box-shadow:var(--shadow-md);display:flex;flex-direction:column;gap:4px;animation:slideIn .2s ease;min-width:260px}
    .toast.success{background:var(--primary-deep)}
    .toast.error{background:var(--red-text)}
    @keyframes slideIn{from{transform:translateX(30px);opacity:0}to{transform:translateX(0);opacity:1}}

    /* ── Empty state ── */
    .empty{text-align:center;padding:48px 24px;color:var(--fg-subtle)}
    .empty-icon{font-size:36px;margin-bottom:12px}
    .empty-title{font-size:15px;font-weight:600;color:var(--fg-muted);margin-bottom:6px}
    .empty-text{font-size:13.5px;line-height:1.55}
    .empty-action{margin-top:18px}

    /* ── Divider ── */
    .divider{height:1px;background:var(--border);margin:20px 0}

    /* ── Chat ── */
    .chat-wrap{display:flex;flex-direction:column;height:100%}
    .chat-messages{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:16px;scroll-behavior:smooth}
    .chat-input-bar{flex-shrink:0;border-top:1px solid var(--border);padding:14px 20px;background:var(--bg);display:flex;gap:10px;align-items:flex-end}
    .chat-msg{display:flex;gap:10px;align-items:flex-end}
    .chat-msg-user{flex-direction:row-reverse}
    .chat-avatar{width:30px;height:30px;border-radius:999px;background:var(--primary);color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;letter-spacing:-.5px}
    .chat-bubble{padding:11px 15px;border-radius:16px;max-width:72%;font-size:13.5px;line-height:1.65;word-break:break-word}
    .chat-bubble p{margin:0 0 8px}.chat-bubble p:last-child{margin-bottom:0}
    .chat-bubble ul{margin:6px 0 6px 18px;padding:0}
    .chat-bubble li{margin-bottom:3px}
    .chat-bubble-user{background:var(--primary);color:#fff;border-bottom-right-radius:4px}
    .chat-bubble-assistant{background:var(--bg);border:1px solid var(--border);color:var(--fg);border-bottom-left-radius:4px;box-shadow:var(--shadow-sm)}
    .chat-citation{font-size:11px;color:var(--primary-deep);opacity:.75;font-style:normal}
    .chat-sources{margin-top:8px;display:flex;flex-wrap:wrap;gap:5px}
    .chat-source-chip{font-size:11px;color:var(--primary-deep);background:var(--primary-xlight);border:1px solid var(--primary-mid);border-radius:5px;padding:2px 9px;text-decoration:none;transition:background .15s}
    .chat-source-chip:hover{background:var(--primary-light)}
    .chat-typing{padding:11px 15px;border-radius:16px;border-bottom-left-radius:4px;background:var(--bg);border:1px solid var(--border);display:inline-flex;gap:5px;align-items:center;box-shadow:var(--shadow-sm)}
    .chat-dot{width:7px;height:7px;border-radius:50%;background:var(--fg-subtle);animation:chatBounce 1.2s ease-in-out infinite}
    .chat-dot:nth-child(2){animation-delay:.18s}.chat-dot:nth-child(3){animation-delay:.36s}
    @keyframes chatBounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-7px)}}
    #chat-input{flex:1;resize:none;min-height:40px;max-height:120px;overflow-y:auto;font-family:inherit;font-size:13.5px;line-height:1.5;padding:9px 12px;border:1px solid var(--border);border-radius:10px;outline:none;transition:border-color .15s}
    #chat-input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(72,91,200,.1)}

    /* ── Mobile ── */
    @media(max-width:768px){
      .hamburger{display:flex}
      .sidebar{position:fixed;left:calc(-1 * var(--sidebar-w) - 4px);top:0;bottom:0;height:100%;z-index:150;transition:left .25s ease;box-shadow:none}
      .sidebar.open{left:0;box-shadow:var(--shadow-lg)}
      .main{width:100%}
      .topbar{padding:0 12px;gap:8px}
      .content{padding:14px}
      #topbar-upload-btn,#global-process-btn{display:none}
      .steps-grid{grid-template-columns:1fr}
      .stats-grid{grid-template-columns:repeat(2,1fr)}
      .card-header{flex-wrap:wrap;gap:8px}
      .draft-card{padding:14px}
      .draft-meta{flex-wrap:wrap}
      .modal{width:96vw;margin:0 auto}
      .filters{flex-direction:column;align-items:stretch}
      .filters select,.filters input{width:100%}
      .banner{flex-direction:column;gap:8px}
      .chat-wrap{height:100%;height:100dvh;max-height:calc(100dvh - 56px)}
      .chat-bubble{max-width:88%}
      .chat-input-bar{padding:10px 12px}
      .login-card{padding:28px 20px}
      th,td{padding:8px 10px}
    }

    /* ── Filters ── */
    .filters{display:flex;gap:10px;margin-bottom:16px;align-items:center;flex-wrap:wrap}
    .filters select,.filters input{width:auto}

    /* ── Draft card ── */
    .draft-card{border:1px solid var(--border);border-radius:var(--r);padding:20px;margin-bottom:14px;background:var(--bg);box-shadow:var(--shadow-sm)}
    .draft-meta{display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap}
    .draft-q{font-size:14px;font-weight:600;color:var(--fg);margin-bottom:8px}
    .draft-a{font-size:13.5px;color:var(--fg-muted);line-height:1.6;background:var(--bg-soft);border-radius:8px;padding:12px;margin-bottom:12px;border:1px solid var(--border)}
    .draft-sources{font-size:12px;color:var(--fg-subtle);margin-bottom:12px}
    .draft-actions{display:flex;gap:8px;flex-wrap:wrap}

    /* ── Result item ── */
    .result-item{border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:10px;background:var(--bg)}
    .result-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;gap:8px}
    .result-sender{font-size:13px;font-weight:600;color:var(--fg)}

    /* ── Pagination ── */
    .pagination{display:flex;align-items:center;gap:8px;margin-top:16px;justify-content:flex-end}
    .page-info{font-size:13px;color:var(--fg-subtle)}

    /* ── Login overlay ── */
    .login-overlay{position:fixed;inset:0;background:linear-gradient(var(--primary-xlight),transparent 40%),var(--bg-soft);z-index:300;display:flex;align-items:center;justify-content:center}
    .login-card{background:var(--bg);border:1px solid var(--border);border-radius:14px;padding:40px;width:380px;max-width:95vw;box-shadow:var(--shadow-lg);text-align:center}
    .login-logo{display:flex;align-items:center;justify-content:center;gap:9px;margin-bottom:24px}
    .login-logo-name{font-size:20px;font-weight:600;color:var(--fg)}
    .login-title{font-size:15px;font-weight:600;color:var(--fg);margin-bottom:6px}
    .login-sub{font-size:13px;color:var(--fg-muted);margin-bottom:28px;line-height:1.55}

<script>
// ── Auth ───────────────────────────────────────────────────────────
const TOKEN_KEY = 'muster:token';
function getToken() { return localStorage.getItem(TOKEN_KEY); }
function setToken(t) { localStorage.setItem(TOKEN_KEY, t); }
function clearToken() { localStorage.removeItem(TOKEN_KEY); }

function showLogin() {
  document.getElementById('login-overlay').style.display = 'flex';
  document.getElementById('login-error').textContent = '';
  setTimeout(() => document.getElementById('login-key').focus(), 50);
}
function hideLogin() { document.getElementById('login-overlay').style.display = 'none'; }

async function submitLogin() {
  const key = document.getElementById('login-key').value.trim();
  if (!key) return;
  document.getElementById('login-error').textContent = '';
  try {
    const r = await fetch('/auth/token', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({api_key: key}),
    });
    if (!r.ok) { document.getElementById('login-error').textContent = 'Invalid access key.'; return; }
    const {access_token} = await r.json();
    setToken(access_token);
    document.getElementById('login-key').value = '';
    hideLogin();
    pages.dashboard();
    updateDraftBadge();
  } catch {
    document.getElementById('login-error').textContent = 'Connection error. Is the server running?';
  }
}

function logout() { clearToken(); showLogin(); }

// ── Banner helpers ─────────────────────────────────────────────────
function isBannerDismissed(id) {
  try { return JSON.parse(localStorage.getItem('muster:dismissed') || '[]').includes(id); } catch { return false; }
}
function dismissBanner(id) {
  try { const d = JSON.parse(localStorage.getItem('muster:dismissed') || '[]'); if (!d.includes(id)) { d.push(id); localStorage.setItem('muster:dismissed', JSON.stringify(d)); } } catch {}
  const el = document.getElementById('banner-' + id);
  if (el) el.style.display = 'none';
}
function banner(id, type, svgIcon, title, body) {
  if (isBannerDismissed(id)) return '';
  return `<div class="banner banner-${type}" id="banner-${id}" style="position:relative">
    <div class="banner-icon">${svgIcon}</div>
    <div style="flex:1"><div class="banner-title">${title}</div><div class="banner-body">${body}</div></div>
    <button class="banner-dismiss" onclick="dismissBanner('${id}')" aria-label="Dismiss">×</button>
  </div>`;
}
const infoIcon = `<svg width="18" height="18" viewBox="0 0 18 18" fill="none"><circle cx="9" cy="9" r="8" fill="var(--primary-light)" stroke="var(--primary-mid)" stroke-width="1.2"/><line x1="9" y1="8" x2="9" y2="13" stroke="var(--primary)" stroke-width="1.5" stroke-linecap="round"/><circle cx="9" cy="5.5" r=".85" fill="var(--primary)"/></svg>`;
const warnIcon = `<svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M9 1.5L16.5 15.5H1.5L9 1.5Z" fill="#fef3c7" stroke="#fde68a" stroke-width="1.2"/><line x1="9" y1="7" x2="9" y2="11.5" stroke="#92400e" stroke-width="1.5" stroke-linecap="round"/><circle cx="9" cy="13.2" r=".85" fill="#92400e"/></svg>`;

// ── Confirm / Reject dialogs ───────────────────────────────────────
function showConfirm(title, body, okLabel = 'Confirm', okClass = 'btn-primary') {
  return new Promise(resolve => {
    document.getElementById('confirm-title').textContent = title;
    document.getElementById('confirm-body').textContent = body;
    const btn = document.getElementById('confirm-ok-btn');
    btn.textContent = okLabel;
    btn.className = 'btn ' + okClass;
    const done = val => { closeModal('confirm-modal'); resolve(val); };
    btn.onclick = () => done(true);
    document.getElementById('confirm-cancel-btn').onclick = () => done(false);
    document.getElementById('confirm-cancel-btn2').onclick = () => done(false);
    document.getElementById('confirm-modal').classList.add('open');
  });
}
function showRejectDialog() {
  return new Promise(resolve => {
    document.getElementById('reject-note').value = '';
    const done = val => { closeModal('reject-modal'); resolve(val); };
    document.getElementById('reject-ok-btn').onclick = () => done(document.getElementById('reject-note').value.trim());
    document.getElementById('reject-cancel-btn').onclick = () => done(null);
    document.getElementById('reject-cancel-btn2').onclick = () => done(null);
    document.getElementById('reject-modal').classList.add('open');
    setTimeout(() => document.getElementById('reject-note').focus(), 50);
  });
}

// ── State ──────────────────────────────────────────────────────────
let currentPage = 'dashboard';
let activeDraftId = null;
let auditOffset = 0;
const AUDIT_LIMIT = 20;
let auditStatusFilter = '';
let auditSenderFilter = '';
let _chatMessages = null;
let _auditEntries = [];

// ── Navigation ─────────────────────────────────────────────────────
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebar-backdrop').classList.toggle('open');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-backdrop').classList.remove('open');

function navigate(page, el) {
  if (currentPage === 'chat') {
    const msgsEl = document.getElementById('chat-messages');
    if (msgsEl) _chatMessages = msgsEl.innerHTML;
  }
  closeSidebar();
  currentPage = page;
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  if (el) el.classList.add('active');
  const titles = {
    dashboard: ['Overview', 'Dashboard'],
    documents: ['Knowledge Base', 'Upload Policy Documents'],
    inbox: ['Email', 'Process Inbox'],
    chat: ['Chat', 'HR Policy Assistant'],
    drafts: ['Review', 'Review Drafts'],
    audit: ['Review', 'Audit Log'],
    settings: ['System', 'Settings'],
  };

  document.getElementById('page-title').textContent = titles[page][1];
  const contentEl = document.getElementById('content');
  const newChatBtn = document.getElementById('new-chat-btn');
  if (page === 'chat') {
    contentEl.style.cssText = 'padding:0;overflow:hidden;display:flex;flex-direction:column';
    if (newChatBtn) newChatBtn.style.display = 'inline-flex';
  } else {
    contentEl.style.cssText = '';
    if (newChatBtn) newChatBtn.style.display = 'none';
  }
  pages[page]();
}

async function navigateAndProcess() {
  navigate('inbox', document.querySelectorAll('.nav-item')[2]);
  await processInbox();
}

// ── API helpers ────────────────────────────────────────────────────
async function api(method, path, body) {
  const token = getToken();
  const headers = {'Content-Type': 'application/json'};
  if (token) headers['Authorization'] = `Bearer ${token}`;
  const opts = {method, headers};
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(path, opts);
  if (r.status === 401) { showLogin(); throw new Error('Session expired. Please sign in again.'); }
  if (!r.ok) { const e = await r.json().catch(() => ({})); throw new Error(e.detail || r.statusText); }
  if (r.status === 204) return null;
  return r.json();
}

function toast(msg, type = 'default') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  const icon = type === 'success' ? '✓' : type === 'error' ? '✕' : 'ℹ';
  el.innerHTML = `<div style="display:flex;align-items:center;gap:10px"><span>${icon}</span> ${msg}</div>`;
  document.getElementById('toast-wrap').appendChild(el);
  setTimeout(() => el.remove(), 3500);
  return el;
}

function statusChip(status) {
  const map = {sent:'chip-green', pending_review:'chip-amber', approved:'chip-green', edited:'chip-blue', rejected:'chip-red', failed:'chip-red', pending:'chip-amber'};
  return `<span class="chip ${map[status] || 'chip-gray'}">${status.replace('_', ' ')}</span>`;
}

function validChip(v) {
  if (!v || v.valid === undefined) return '';
  return v.valid
    ? `<span class="chip chip-green">✓ valid ${Math.round((v.confidence||0)*100)}%</span>`
    : `<span class="chip chip-red">✕ flagged</span>`;
}

function setContent(h) {
  const el = document.getElementById('content');
  el.innerHTML = h;
  el.animate([{opacity:0,transform:'translateY(5px)'},{opacity:1,transform:'translateY(0)'}],{duration:160,easing:'ease',fill:'forwards'});
}

function musterAvatar() {
  return `<div class="chat-avatar"><svg width="20" height="14" viewBox="0 0 52 38" fill="none"><circle cx="14" cy="22" r="10" fill="white"/><circle cx="26" cy="16" r="13" fill="white"/><circle cx="38" cy="22" r="10" fill="white"/><rect x="4" y="22" width="44" height="14" rx="2" fill="white"/></svg></div>`;
}

// ── Dashboard ──────────────────────────────────────────────────────
const pages = {
  async dashboard() {
    setContent(`<div style="display:flex;flex-direction:column;gap:16px">
      <div class="steps-grid">
        ${[1,2,3].map(i => `<div class="step-card"><div style="display:flex;align-items:center;gap:10px"><div class="skeleton" style="width:32px;height:32px;border-radius:999px"></div><div class="skeleton" style="height:16px;width:120px"></div></div><div class="skeleton" style="height:40px;border-radius:6px;margin-top:4px"></div><div class="skeleton" style="height:36px;border-radius:8px;margin-top:auto"></div></div>`).join('')}
      </div>
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:14px">
        ${[1,2,3,4].map(() => `<div class="stat-card"><div class="skeleton" style="width:34px;height:34px;border-radius:8px;margin-bottom:10px"></div><div class="skeleton" style="height:11px;width:80px;margin-bottom:8px"></div><div class="skeleton" style="height:26px;width:50px"></div></div>`).join('')}
      </div>
    </div>`);

    let docs = [], drafts = [], audit = {total:0}, auditSent = {total:0}, sett = {};
    try {
      [docs, drafts, audit, auditSent, sett] = await Promise.all([
        api('GET', '/documents'),
        api('GET', '/drafts'),
        api('GET', '/audit?limit=1'),
        api('GET', '/audit?status=sent&limit=1'),
        api('GET', '/settings'),
      ]);
    } catch(e) { toast(e.message, 'error'); }

    const docCount = docs.length;
    const step1Done = docCount > 0;

function handleFileUpload(e) {
  const file = e.target.files[0]; if (!file) return;
  e.target.value = '';
  const fd = new FormData(); fd.append('file', file);

  const toastEl = document.createElement('div');
  toastEl.className = 'toast';
  toastEl.innerHTML = `<div style="display:flex;align-items:center;gap:10px"><span>⬆</span> Uploading "${file.name}"…</div><div class="toast-progress"><div class="toast-progress-fill" id="upload-progress-fill"></div></div>`;
  document.getElementById('toast-wrap').appendChild(toastEl);

  const token = getToken();
  const xhr = new XMLHttpRequest();
  xhr.open('POST', '/documents');
  if (token) xhr.setRequestHeader('Authorization', `Bearer ${token}`);

  xhr.upload.onprogress = ev => {
    if (ev.lengthComputable) {
      const pct = Math.round((ev.loaded / ev.total) * 100);
      const fill = document.getElementById('upload-progress-fill');
      if (fill) fill.style.width = pct + '%';
    }
  };

  xhr.onload = () => {
    toastEl.remove();
    if (xhr.status >= 200 && xhr.status < 300) {
      let data = {};
      try { data = JSON.parse(xhr.responseText); } catch {}
      toast(`"${data.filename || file.name}" uploaded — ${data.chunks || 0} passages indexed`, 'success');
      if (currentPage === 'documents') loadDocs();
      if (currentPage === 'dashboard') pages.dashboard();
    } else {
      let detail = xhr.statusText;
      try { detail = JSON.parse(xhr.responseText).detail || detail; } catch {}
      toast(detail, 'error');
    }
  };

  xhr.onerror = () => { toastEl.remove(); toast('Upload failed — network error', 'error'); };
  xhr.send(fd);
}

function handleFileDrop(e) {
  const file = e.dataTransfer.files[0]; if (!file) return;
  const dt = new DataTransfer(); dt.items.add(file);
  document.getElementById('file-input').files = dt.files;
  handleFileUpload({target: document.getElementById('file-input')});
}

async function deleteDoc(docId, filename) {
  const ok = await showConfirm('Remove Document', `Remove "${filename}" from the knowledge base? This cannot be undone.`, 'Remove', 'btn-danger');
  if (!ok) return;
  try {
    await api('DELETE', `/documents/${docId}`);
    toast('Document removed from knowledge base', 'success');
    await loadDocs();
  } catch(e) { toast(e.message, 'error'); }
}

async function processInbox() {
  const confirmed = await showConfirm(
    'Process Inbox',
    'This will read all unread emails and send AI-generated replies. Make sure your policy documents are up to date before continuing.',
    'Process Now',
    'btn-accent'
  );
  if (!confirmed) return;

  const btn = document.getElementById('process-btn');
  const globalBtn = document.getElementById('global-process-btn');
  const dashBtn = document.getElementById('dash-process-btn');
  [btn, globalBtn, dashBtn].forEach(b => { if (b) { b.disabled = true; b.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" style="animation:spin 1s linear infinite"><path d="M12 2a10 10 0 110 20A10 10 0 0112 2zm0 2a8 8 0 100 16A8 8 0 0012 4z" opacity=".25"/><path d="M12 2a10 10 0 0110 10h-2a8 8 0 00-8-8V2z"/></svg> Processing…'; }});

  if (!document.querySelector('#inbox-results')) {
    navigate('inbox', document.querySelectorAll('.nav-item')[2]);
  }

  try {
    const data = await api('POST', '/inbox/process');
    const el = document.getElementById('inbox-results');
    if (!data || !data.results) throw new Error('No response from server');
    if (!data.results.length) {
      el.innerHTML = `<div class="empty"><div class="empty-icon">✓</div><div class="empty-title">Inbox is empty</div><div class="empty-text">No unread emails found. Send a question to your Gmail inbox, then process again.</div></div>`;
    } else {
      el.innerHTML = data.results.map(r => `
        <div class="result-item">
          <div class="result-header">
            <span class="result-sender">📧 ${r.sender}</span>
            ${statusChip(r.status)}
          </div>
          <div style="font-size:12px;color:var(--fg-subtle);margin-bottom:6px"><strong>Subject:</strong> ${r.subject || '—'}</div>
          <div style="font-size:13px;color:var(--fg-muted);margin-bottom:8px;font-style:italic">"${(r.question||'').slice(0,120)}${(r.question||'').length>120?'…':''}"</div>
          ${r.status === 'sent' ? `<div style="font-size:12.5px;color:var(--primary-deep);font-weight:500">✓ Reply sent to ${r.sender}</div>` : ''}
          ${r.status === 'pending_review' ? `<div style="font-size:12.5px;color:#92400e;font-weight:500">Draft saved — go to Review Drafts to approve and send</div>` : ''}
          ${r.error ? `<div style="color:var(--red);font-size:12px;margin-top:6px">⚠ ${r.error}</div>` : ''}
        </div>`).join('');
    }
    toast(`Processed ${data.processed} email${data.processed!==1?'s':''}`, 'success');
    updateDraftBadge();
  } catch(e) { toast(e.message, 'error'); }
  finally {
    [btn, globalBtn, dashBtn].forEach(b => {
      if (!b) return;
      if (b.id === 'process-btn') { b.disabled = false; b.innerHTML = '<svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg> Process Inbox Now'; }
      if (b.id === 'dash-process-btn') { b.disabled = false; b.innerHTML = '<svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg> Process Inbox Now →'; }
      if (b.id === 'global-process-btn') { b.disabled = false; b.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg> Process Inbox'; }
    });
  }
}

// ── Drafts helpers ─────────────────────────────────────────────────
async function loadDrafts() {
  try {
    const drafts = await api('GET', '/drafts');
    updateDraftBadge(drafts.length);
    const el = document.getElementById('drafts-list');
    if (!drafts.length) {
      el.innerHTML = `<div class="empty"><div class="empty-icon">✉️</div><div class="empty-title">No pending drafts</div><div class="empty-text">Enable Human Review Mode in Settings, then process the inbox. Replies will appear here for approval before being sent.</div></div>`;
      return;
    }
    el.innerHTML = drafts.map(d => `
      <div class="draft-card">
        <div class="draft-meta">
          <span style="font-size:13px;font-weight:600;color:var(--fg)">📧 ${d.sender}</span>
          <span style="font-size:12px;color:var(--fg-subtle)">${d.subject}</span>
          ${validChip(d.validation)}
        </div>
        <div class="draft-q">${d.question}</div>
        <div class="draft-a">${d.proposed_answer}</div>
        ${d.sources?.length ? `<div class="draft-sources">Sources: ${d.sources.join(', ')}</div>` : ''}
        <div class="draft-actions">
          <button class="btn btn-ghost-primary btn-sm" onclick="openApproveModal(${d.id}, \`${d.question.replace(/`/g,"'")}\`, \`${d.proposed_answer.replace(/`/g,"'")}\`)">✓ Approve &amp; Send</button>
          <button class="btn btn-danger btn-sm" onclick="quickReject(${d.id})">✕ Reject</button>
        </div>
      </div>`).join('');
  } catch(e) { toast(e.message, 'error'); }
}

function openApproveModal(id, question, answer) {
  activeDraftId = id;
  document.getElementById('modal-question').textContent = question;
  document.getElementById('modal-answer').value = answer;
  document.getElementById('approve-modal').classList.add('open');
}

function closeModal(id) { document.getElementById(id).classList.remove('open'); }

async function submitApprove() {
  const edited = document.getElementById('modal-answer').value;
  const original = document.getElementById('modal-answer').defaultValue;
  try {
    await api('POST', `/drafts/${activeDraftId}/approve`, edited !== original ? {edited_answer: edited} : {});
    toast('Reply approved and sent', 'success');
    closeModal('approve-modal');
    await loadDrafts();
  } catch(e) { toast(e.message, 'error'); }
}

async function submitReject() {
  const note = await showRejectDialog();
  if (note === null) return;
  try {
    await api('POST', `/drafts/${activeDraftId}/reject`, {note});
    toast('Draft rejected');
    closeModal('approve-modal');
    await loadDrafts();
  } catch(e) { toast(e.message, 'error'); }
}

async function quickReject(id) {
  const note = await showRejectDialog();
  if (note === null) return;
  try {
    await api('POST', `/drafts/${id}/reject`, {note});
    toast('Draft rejected');
    await loadDrafts();
  } catch(e) { toast(e.message, 'error'); }
}

function updateDraftBadge(count) {
  if (count === undefined) api('GET', '/drafts').then(d => updateDraftBadge(d.length)).catch(()=>{});
  else {
    const b = document.getElementById('draft-badge');
    b.style.display = count > 0 ? 'inline' : 'none';
    b.textContent = count;
  }
}

// ── Audit helpers ──────────────────────────────────────────────────
async function loadAudit() {
  try {
    const params = new URLSearchParams({limit: AUDIT_LIMIT, offset: auditOffset});
    if (auditStatusFilter) params.set('status', auditStatusFilter);
    if (auditSenderFilter) params.set('sender', auditSenderFilter);
    const data = await api('GET', `/audit?${params}`);
    _auditEntries = data.entries || [];
    const body = document.getElementById('audit-body');
    if (!_auditEntries.length) {
      body.innerHTML = `<tr><td colspan="5"><div class="empty"><div class="empty-icon">📋</div><div class="empty-text">No entries found</div></div></td></tr>`;
    } else {
      body.innerHTML = _auditEntries.map((e, i) => `<tr onclick="openAuditDetail(${i})" style="cursor:pointer">
        <td style="font-size:12px;color:var(--fg-subtle);white-space:nowrap">${new Date(e.timestamp).toLocaleString()}</td>
        <td style="font-size:13px">${e.sender}</td>
        <td style="font-size:13px;max-width:280px">${(e.question||'').slice(0,80)}${(e.question||'').length>80?'…':''}</td>
        <td>${statusChip(e.status)}</td>
        <td>${validChip(e.validation)}</td>
      </tr>`).join('');
    }
    const showing = Math.min(auditOffset + AUDIT_LIMIT, data.total);
    document.getElementById('audit-info').textContent = `${auditOffset + 1}–${showing} of ${data.total}`;
    document.getElementById('audit-prev').disabled = auditOffset === 0;
    document.getElementById('audit-next').disabled = showing >= data.total;
  } catch(e) { toast(e.message, 'error'); }
}

function openAuditDetail(idx) {
  const e = _auditEntries[idx];
  if (!e) return;
  document.getElementById('audit-detail-body').innerHTML = `
    <div class="form-group">
      <label style="font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--fg-subtle)">From</label>
      <p style="font-size:13.5px;color:var(--fg)">${e.sender}</p>
    </div>
    <div class="form-group">
      <label style="font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--fg-subtle)">Time</label>
      <p style="font-size:13.5px;color:var(--fg)">${new Date(e.timestamp).toLocaleString()}</p>
    </div>
    <div class="form-group">
      <label style="font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--fg-subtle)">Question</label>
      <div style="font-size:13.5px;color:var(--fg);background:var(--bg-soft);border:1px solid var(--border);border-radius:8px;padding:12px;line-height:1.6;max-height:160px;overflow-y:auto;white-space:pre-wrap">${(e.question||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>
    </div>
    <div style="display:flex;gap:10px;flex-wrap:wrap">
      <div><label style="font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--fg-subtle);display:block;margin-bottom:6px">Status</label>${statusChip(e.status)}</div>
      ${e.validation ? `<div><label style="font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--fg-subtle);display:block;margin-bottom:6px">Validation</label>${validChip(e.validation)}</div>` : ''}
    </div>`;
  document.getElementById('audit-detail-modal').classList.add('open');
}

// ── Settings helpers ───────────────────────────────────────────────
async function saveSetting(key, value) {
  try {
    await api('PATCH', '/settings', {[key]: value});
    toast('Setting saved', 'success');
  } catch(e) { toast(e.message, 'error'); }
}

// ── Chat helpers ───────────────────────────────────────────────────
let chatSessionId = newChatSession();

function newChatSession() {
  return 'chat-' + Date.now().toString(36) + '-' + Math.random().toString(36).substr(2, 9);
}

function useSuggestion(text) {
  const input = document.getElementById('chat-input');
  if (!input) return;
  input.value = text;
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 120) + 'px';
  sendChatMessage();
}

function handleChatKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChatMessage(); }
}

function mdToHtml(text) {
  let h = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  h = h.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  h = h.replace(/\*(.+?)\*/g,'<em>$1</em>');
  h = h.replace(/\[Source:\s*([^\]]+)\]/g,'<span class="chat-citation">[Source: $1]</span>');
  h = h.replace(/^[-•]\s+(.+)$/gm,'<li>$1</li>');
  h = h.replace(/(<li>[\s\S]*?<\/li>)/g,'<ul>$1</ul>');
  h = h.split(/\n\n+/).map(p => p.trim() ? `<p>${p.replace(/\n/g,'<br>')}</p>` : '').join('');
  return h;
}

function appendUserBubble(text) {
  const msgs = document.getElementById('chat-messages');
  const el = document.createElement('div');
  el.className = 'chat-msg chat-msg-user';
  el.innerHTML = `<div class="chat-bubble chat-bubble-user">${text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>')}</div>`;
  msgs.appendChild(el);
  msgs.scrollTop = msgs.scrollHeight;
}

function appendTypingIndicator() {
  const msgs = document.getElementById('chat-messages');
  const el = document.createElement('div');
  el.className = 'chat-msg'; el.id = 'chat-typing-indicator';
  el.innerHTML = `${musterAvatar()}<div class="chat-typing"><div class="chat-dot"></div><div class="chat-dot"></div><div class="chat-dot"></div></div>`;
  msgs.appendChild(el);
  msgs.scrollTop = msgs.scrollHeight;
}

function removeTypingIndicator() {
  const el = document.getElementById('chat-typing-indicator');
  if (el) el.remove();
}

function appendAssistantBubble(answer, sources) {
  const msgs = document.getElementById('chat-messages');
  const base = (window._publicBase || '').replace(/\/$/, '');
  const sourceChips = sources.length
    ? `<div class="chat-sources">${sources.map(s => `<a class="chat-source-chip" href="${base}/files/${encodeURIComponent(s)}" target="_blank">📄 ${s}</a>`).join('')}</div>`
    : '';
  const el = document.createElement('div');
  el.className = 'chat-msg';
  el.innerHTML = `${musterAvatar()}<div><div class="chat-bubble chat-bubble-assistant">${mdToHtml(answer)}${sourceChips}</div></div>`;
  msgs.appendChild(el);
  msgs.scrollTop = msgs.scrollHeight;
}

async function sendChatMessage() {
  const input = document.getElementById('chat-input');
  const message = input.value.trim();
  if (!message) return;

  const sendBtn = document.getElementById('chat-send-btn');
  input.value = ''; input.style.height = 'auto'; sendBtn.disabled = true;

  appendUserBubble(message);
  appendTypingIndicator();

  try {
    const data = await api('POST', '/chat/message', { session_id: chatSessionId, message });
    removeTypingIndicator();
    appendAssistantBubble(data.answer, data.sources || []);
  } catch(e) {
    removeTypingIndicator();
    appendAssistantBubble('Sorry, something went wrong — ' + e.message, []);
  } finally {
    sendBtn.disabled = false;
    input.focus();
  }
}

function startNewChatConversation() {
  api('DELETE', `/chat/${chatSessionId}`).catch(() => {});
  chatSessionId = newChatSession();
  _chatMessages = null;
  if (currentPage === 'chat') pages.chat();
}

// ── Keyboard shortcuts ─────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') document.querySelectorAll('.overlay.open').forEach(el => el.classList.remove('open'));
});

// ── CSS for spinner ────────────────────────────────────────────────
const style = document.createElement('style');
style.textContent = '@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}';
document.head.appendChild(style);

// ── Init ───────────────────────────────────────────────────────────
window._publicBase = window.location.origin;
fetch('/health').then(r=>r.json()).then(d=>{ if(d.public_base_url) window._publicBase = d.public_base_url; }).catch(()=>{});

if (getToken()) {
  hideLogin();
  pages.dashboard();
  updateDraftBadge();
} else {
  showLogin();
}
</script>
